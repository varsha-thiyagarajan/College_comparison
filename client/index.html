<!DOCTYPE html>
<html>
<head>
  <title>College Compare</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
   <h2>Find Colleges</h2>

<div class="search-box">
  <input type="text" id="course" placeholder="Course (e.g. B.Tech)">
  <input type="text" id="location" placeholder="Location">
  <input type="number" id="budget" placeholder="Max Fees">
  <input type="number" id="rank" placeholder="Your Rank">

  <button onclick="searchColleges()">Search</button>
</div>
  <h1>College Comparison</h1>

  <div id="college-list"></div>
  <h2>🎯 Admission Predictor</h2>

<div class="search-box">
  <input type="number" id="predict-rank" placeholder="Enter your rank">
  <button onclick="predictColleges()">Predict</button>
</div>

<div id="prediction-result"></div>
  <h2>Selected Colleges</h2>
  <button onclick="compareColleges()">Compare</button>


  <div id="comparison"></div>

  <script src="script.js"></script>
</body>
</html>
